<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arroz con Leche | VIBRAS POSITIVAS HM</title>
    <style>
        :root {
            --marron: #4e2c1e;
            --crema: #fff5e6;
            --amarillo: #fdb913;
            --rojo: #be1622;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--crema);
            color: var(--marron);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            background: white;
            max-width: 450px;
            width: 100%;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid var(--marron);
        }

        .header-img {
            width: 100%;
            height: 250px;
            background: url('https://i.imgur.com/your-image-link.jpg') center/cover; /* Reemplazar con tu imagen real */
            background-color: var(--marron);
        }

        .content {
            padding: 25px;
            text-align: center;
        }

        .badge {
            background: var(--rojo);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 { margin: 10px 0; color: var(--marron); font-size: 28px; }
        .price { font-size: 32px; font-weight: 800; color: var(--rojo); margin-bottom: 20px; }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label { display: block; font-weight: bold; margin-bottom: 5px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .qty-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .btn-qty {
            background: var(--marron);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }

        .btn-main:active { transform: scale(0.98); }

        .btn-pay { background-color: var(--marron); color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; }

        .footer {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-img"></div>
    
    <div class="content">
        <span class="badge">Viernes 1 de Mayo</span>
        <h1>Arroz con Leche</h1>
        <p>Recipiente de 14 Oz - Hecho con amor</p>
        <div class="price" id="display-price">$10.000</div>

        <div class="qty-selector">
            <button class="btn-qty" onclick="changeQty(-1)">-</button>
            <span id="qty-text" style="font-size: 24px; font-weight: bold;">1</span>
            <button class="btn-qty" onclick="changeQty(1)">+</button>
        </div>

        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" placeholder="¿A quién entregamos?">
        </div>

        <div class="form-group">
            <label>Dirección de Entrega</label>
            <input type="text" id="direccion" placeholder="Calle, Barrio, Apto">
        </div>

        <button class="btn-main btn-pay" onclick="pagarDebito()">
            Pagar con Débito/Crédito
        </button>

        <button class="btn-main btn-whatsapp" onclick="enviarWhatsApp()">
            Pedir por WhatsApp (Pago Contra Entrega)
        </button>

        <div class="footer">
            <p>Tarifas según Tintorillo Pro aplicadas.</p>
            <p>© 2026 Vibras Positivas. Todos los derechos reservados.</p>
        </div>
    </div>
</div>

<script>
    let cantidad = 1;
    const precioUnitario = 10000;

    function changeQty(value) {
        cantidad += value;
        if (cantidad < 1) cantidad = 1;
        document.getElementById('qty-text').innerText = cantidad;
        const total = cantidad * precioUnitario;
        document.getElementById('display-price').innerText = `$${total.toLocaleString('es-CO')}`;
    }

    function validarCampos() {
        const nombre = document.getElementById('nombre').value;
        const direccion = document.getElementById('direccion').value;
        if (!nombre || !direccion) {
            alert("Por favor completa tu nombre y dirección.");
            return false;
        }
        return { nombre, direccion };
    }

    function enviarWhatsApp() {
        const datos = validarCampos();
        if (!datos) return;

        const total = cantidad * precioUnitario;
        const mensaje = `¡Hola! ✨ Vengo de la App de VIBRAS POSITIVAS HM.\n\n` +
                        `Quiero pedir Arroz con Leche:\n` +
                        `✅ Cantidad: ${cantidad}\n` +
                        `✅ Total: $${total.toLocaleString('es-CO')}\n` +
                        `✅ Método: Pago contra entrega\n\n` +
                        `📍 Entrega para: ${datos.nombre}\n` +
                        `🏠 Dirección: ${datos.direccion}`;

        const url = `https://wa.me/TUNUMERO?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
    }

    function pagarDebito() {
        const datos = validarCampos();
        if (!datos) return;
        
        alert("Redirigiendo a pasarela de pagos segura...");
        // Aquí se integraría el link de Bold, Wompi o MercadoPago
    }
</script>

</body>
</html>
