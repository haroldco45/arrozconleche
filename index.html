<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arroz con Leche | VIBRAS POSITIVAS HM</title>
    <style>
        :root {
            --marron: #4e2c1e;
            --crema: #fff5e6;
            --rojo: #be1622;
            --verde: #25D366;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 10px;
        }

        /* VISTA CLIENTE */
        .app-card {
            background: white;
            max-width: 450px;
            margin: auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 2px solid var(--marron);
        }

        .header-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .content { padding: 20px; text-align: center; }

        .price { font-size: 35px; color: var(--rojo); font-weight: bold; margin: 10px 0; }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            color: white;
        }

        .btn-paga { background-color: var(--marron); }
        .btn-debe { background-color: var(--rojo); }
        .btn-admin { background: none; color: #888; font-size: 12px; text-decoration: underline; margin-top: 20px; }

        /* PANEL ADMIN */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: var(--marron); color: white; }
    </style>
</head>
<body>

<div class="app-card" id="client-view">
    <img src="https://i.ibb.co/6aa26178c3d03b1b00065079d949f518006224cc741d52bc/arroz.jpg" class="header-img" alt="Arroz con Leche">
    
    <div class="content">
        <h1>Arroz con Leche</h1>
        <p>Tradición de <b>VIBRAS POSITIVAS HM</b></p>
        <div class="price">$10.000</div>

        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="direccion" placeholder="Dirección de entrega">
        
        <button class="btn btn-paga" onclick="procesarPedido('PAGADO')">PAGAR AHORA</button>
        <button class="btn btn-debe" onclick="procesarPedido('DEBE')">LO DEBO (Crédito)</button>

        <button class="btn-admin" onclick="mostrarAdmin()">Acceso Administrador</button>
    </div>
</div>

<div id="admin-panel">
    <h2>Control de Ventas - VIBRAS POSITIVAS HM</h2>
    <button onclick="cerrarAdmin()">Volver a la App</button>
    <p>Total Ventas: <span id="resumen-ventas">$0</span></p>
    
    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tabla-ventas"></tbody>
    </table>
    <button class="btn btn-debe" style="margin-top:20px" onclick="limpiarRegistros()">Limpiar Datos</button>
</div>

<script>
    const WHATSAPP_NUM = "573106418219";
    const PRECIO = 10000;

    // Cargar datos al iniciar
    let ventas = JSON.parse(localStorage.getItem('ventas_vibras')) || [];

    function procesarPedido(estado) {
        const nombre = document.getElementById('nombre').value;
        const direccion = document.getElementById('direccion').value;

        if (!nombre || !direccion) {
            alert("Completa tus datos para el envío");
            return;
        }

        // 1. Guardar en registro de Admin
        const nuevoPedido = { nombre, direccion, estado, total: PRECIO, fecha: new Date().toLocaleString() };
        ventas.push(nuevoPedido);
        localStorage.setItem('ventas_vibras', JSON.stringify(ventas));

        // 2. Crear mensaje de WhatsApp
        let mensaje = "";
        if (estado === 'DEBE') {
            mensaje = `🚨 *NUEVO PEDIDO AL DEBE*\n\n`;
        } else {
            mensaje = `✅ *NUEVO PEDIDO PAGADO*\n\n`;
        }

        mensaje += `👤 Cliente: ${nombre}\n📍 Dirección: ${direccion}\n💰 Valor: $${PRECIO.toLocaleString()}\n📌 Estado: ${estado}\n\n_VIBRAS POSITIVAS HM_`;

        // 3. Redirigir a WhatsApp
        const url = `https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
        
        alert("¡Pedido enviado correctamente!");
    }

    // Funciones Admin
    function mostrarAdmin() {
        const pass = prompt("Clave de administrador:");
        if (pass === "1234") { // Cambia tu clave aquí
            document.getElementById('admin-panel').style.display = 'block';
            actualizarTabla();
        } else {
            alert("Clave incorrecta");
        }
    }

    function cerrarAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
    }

    function actualizarTabla() {
        const tabla = document.getElementById('tabla-ventas');
        const resumen = document.getElementById('resumen-ventas');
        tabla.innerHTML = "";
        let suma = 0;

        ventas.forEach(v => {
            suma += v.total;
            tabla.innerHTML += `<tr><td>${v.nombre}</td><td>${v.estado}</td><td>$${v.total}</td></tr>`;
        });
        resumen.innerText = `$${suma.toLocaleString()}`;
    }

    function limpiarRegistros() {
        if(confirm("¿Seguro quieres borrar todas las ventas?")) {
            ventas = [];
            localStorage.setItem('ventas_vibras', JSON.stringify(ventas));
            actualizarTabla();
        }
    }
</script>

</body>
</html>
