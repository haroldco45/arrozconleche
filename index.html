<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBRAS POSITIVAS HM | Arroz con Leche</title>
    <style>
        :root {
            --marron: #4e2c1e;
            --crema: #fff5e6;
            --rojo: #be1622;
            --verde: #25D366;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--crema); 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* RELOJ SUPERIOR */
        #reloj-superior {
            background: var(--marron);
            color: white;
            width: 100%;
            text-align: center;
            padding: 5px 0;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .app-card { 
            background: white; 
            max-width: 500px; 
            width: 100%;
            min-height: 100vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            position: relative;
        }

        .header-img { width: 100%; display: block; }

        .content { padding: 25px; text-align: center; }

        .price-tag { font-size: 40px; color: var(--rojo); font-weight: 900; margin: 15px 0; }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; 
            border-radius: 12px; font-size: 16px; box-sizing: border-box;
        }
        
        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; 
            color: white; text-transform: uppercase;
        }

        .btn-paga { background-color: var(--marron); }
        .btn-debe { background-color: var(--rojo); }
        
        /* BLOQUEO POR SUSCRIPCIÓN */
        #bloqueo {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            text-align: center;
            padding-top: 100px;
        }

        /* ADMIN PANEL */
        #admin-panel { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; 
        }

        .btn-cobrar { background-color: var(--verde); color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>

<div id="reloj-superior">Cargando hora...</div>

<div id="bloqueo">
    <h1 style="color:red">SUSCRIPCIÓN VENCIDA</h1>
    <p>Tu acceso a la App de Arroz con Leche ha caducado el 15 de Mayo.</p>
    <p>Contacta a Soporte para renovar.</p>
</div>

<div class="app-card" id="main-app">
    <img src="leche.jpg" class="header-img">
    
    <div class="content">
        <div class="price-tag">$10.000</div>

        <input type="text" id="nombre" placeholder="👤 Nombre y Apellido">
        <input type="number" id="celular" placeholder="📱 Número de Celular">
        <input type="text" id="direccion" placeholder="📍 Dirección de entrega">
        
        <button class="btn btn-paga" onclick="procesarPedido('PAGADO')">💰 YA PAGUÉ</button>
        <button class="btn btn-debe" onclick="procesarPedido('DEBE')">📝 LO DEBO</button>

        <p style="cursor:pointer; font-size:12px; color:#ccc; margin-top:40px;" onclick="mostrarAdmin()">Acceso Admin</p>
        
        <div style="font-size: 10px; color:#888; margin-top:20px;">
            VIBRAS POSITIVAS HM © 2026
        </div>
    </div>
</div>

<div id="admin-panel">
    <h3>ADMINISTRACIÓN - VIBRAS POSITIVAS HM</h3>
    <button onclick="cerrarAdmin()">✖ Cerrar</button>
    <button onclick="descargarBackup()">📥 Backup</button>
    <hr>
    <p>Ventas: <strong id="total-ventas">$0</strong></p>
    <table id="tabla-ventas">
        <thead>
            <tr><th>Cliente</th><th>Estado</th><th>Acción</th></tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>
</div>

<script>
    const MI_WHATSAPP = "573106418219";
    const PRECIO = 10000;
    const FECHA_VENCIMIENTO = new Date("2026-05-15T23:59:59");
    let registros = JSON.parse(localStorage.getItem('db_vibras_hm')) || [];

    // 1. RELOJ Y CONTROL DE FECHA
    function actualizarReloj() {
        const ahora = new Date();
        const strHora = ahora.toLocaleTimeString();
        document.getElementById('reloj-superior').innerText = strHora;

        // Validar Suscripción
        if (ahora > FECHA_VENCIMIENTO) {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('bloqueo').style.display = 'block';
        }
    }
    setInterval(actualizarReloj, 1000);

    // 2. PROCESAR PEDIDO
    function procesarPedido(tipo) {
        const nom = document.getElementById('nombre').value;
        const cel = document.getElementById('celular').value;
        const dir = document.getElementById('direccion').value;

        if (!nom || !cel || !dir) return alert("Llena los datos.");

        const pedido = { nom, cel, dir, tipo, monto: PRECIO, fecha: new Date().toLocaleString() };
        registros.push(pedido);
        localStorage.setItem('db_vibras_hm', JSON.stringify(registros));

        const msj = `*NUEVO PEDIDO VIBRAS POSITIVAS HM*\n\n` +
                    `📌 *ESTADO:* ${(tipo === 'DEBE') ? "🚨 DEBE" : "✅ PAGADO"}\n` +
                    `👤 *CLIENTE:* ${nom}\n` +
                    `📱 *CELULAR:* ${cel}\n` +
                    `📍 *DIRECCIÓN:* ${dir}`;

        window.open(`https://wa.me/${MI_WHATSAPP}?text=${encodeURIComponent(msj)}`, '_blank');
    }

    // 3. ADMIN
    function mostrarAdmin() {
        if (prompt("Clave:") === "1027") {
            document.getElementById('admin-panel').style.display = 'block';
            renderTabla();
        }
    }

    function cerrarAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function renderTabla() {
        const tbody = document.getElementById('cuerpo-tabla');
        tbody.innerHTML = "";
        let total = 0;
        registros.forEach(r => {
            total += r.monto;
            let btnCobro = r.tipo === 'DEBE' ? 
                `<a class="btn-cobrar" href="https://wa.me/57${r.cel}?text=Hola%20${r.nom},%20te%20escribimos%20de%20VIBRAS%20POSITIVAS%20HM%20para%20el%20cobro%20del%20arroz.">COBRAR</a>` : 
                "✅ OK";

            tbody.innerHTML += `<tr>
                <td>${r.nom}</td>
                <td>${r.tipo}</td>
                <td>${btnCobro}</td>
            </tr>`;
        });
        document.getElementById('total-ventas').innerText = `$${total.toLocaleString()}`;
    }

    function descargarBackup() {
        const blob = new Blob([JSON.stringify(registros)], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "backup_vibras_positivas.txt";
        a.click();
    }
</script>
</body>
</html>
