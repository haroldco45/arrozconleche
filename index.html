<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arroz con Leche | VIBRAS POSITIVAS HM</title>
    <style>
        :root {
            --marron: #4e2c1e;
            --crema: #fff5e6;
            --rojo: #be1622;
            --verde: #25D366;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--crema); 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
        }
        
        .app-card { 
            background: white; 
            max-width: 500px; 
            width: 100%;
            min-height: 100vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            position: relative;
        }

        .header-img { 
            width: 100%; 
            display: block;
            margin: 0;
        }

        .content { padding: 25px; text-align: center; }

        .price-tag { 
            font-size: 40px; 
            color: var(--rojo); 
            font-weight: 900; 
            margin: 15px 0;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box;
        }
        
        .btn { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            color: white; 
            text-transform: uppercase;
        }

        .btn-paga { background-color: var(--marron); }
        .btn-debe { background-color: var(--rojo); }
        
        /* PANEL ADMIN */
        #admin-panel { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: white; 
            z-index: 100; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-y: auto; 
        }

        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-sm { padding: 10px; font-size: 12px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: var(--marron); color: white; }

        .btn-cobrar {
            background-color: var(--verde);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        .footer-info { font-size: 11px; color: #777; margin-top: 30px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="app-card" id="client-view">
    <img src="leche.jpg" class="header-img">
    
    <div class="content">
        <div class="price-tag">$10.000</div>

        <input type="text" id="nombre" placeholder="👤 Nombre y Apellido">
        <input type="number" id="celular" placeholder="📱 Número de Celular">
        <input type="text" id="direccion" placeholder="📍 Dirección de entrega">
        
        <button class="btn btn-paga" onclick="procesarPedido('PAGADO')">💰 YA PAGUÉ</button>
        <button class="btn btn-debe" onclick="procesarPedido('DEBE')">📝 LO DEBO</button>

        <p style="cursor:pointer; font-size:12px; color:#ccc; margin-top:40px;" onclick="mostrarAdmin()">Acceso Admin</p>
        
        <div class="footer-info">
            VIBRAS POSITIVAS HM<br>
            © 2026 TODOS LOS DERECHOS RESERVADOS
        </div>
    </div>
</div>

<div id="admin-panel">
    <h3>CONTROL DE COBROS</h3>
    <div class="admin-nav">
        <button class="btn-sm" onclick="cerrarAdmin()">✖ Cerrar</button>
        <button class="btn-sm" style="background:#28a745; color:white;" onclick="descargarBackup()">📥 Backup</button>
        <button class="btn-sm" style="background:#ffc107;" onclick="document.getElementById('input-file').click()">📤 Restaurar</button>
    </div>
    
    <input type="file" id="input-file" style="display:none" onchange="restaurarBackup(event)">
    <p>Total en ventas: <strong id="resumen-ventas">$0</strong></p>
    
    <table id="tabla-ventas">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>
</div>

<script>
    const MI_WHATSAPP = "573106418219";
    const PRECIO = 10000;
    let registros = JSON.parse(localStorage.getItem('db_vibras_hm')) || [];

    function procesarPedido(tipo) {
        const nom = document.getElementById('nombre').value;
        const cel = document.getElementById('celular').value;
        const dir = document.getElementById('direccion').value;

        if (!nom || !cel || !dir) return alert("Completa los datos.");

        const pedido = { nom, cel, dir, tipo, monto: PRECIO, fecha: new Date().toLocaleString() };
        registros.push(pedido);
        localStorage.setItem('db_vibras_hm', JSON.stringify(registros));

        const msj = `*NUEVO PEDIDO VIBRAS POSITIVAS HM*\n\n` +
                    `📌 *ESTADO:* ${(tipo === 'DEBE') ? "🚨 DEBE" : "✅ PAGADO"}\n` +
                    `👤 *CLIENTE:* ${nom}\n` +
                    `📱 *CELULAR:* ${cel}\n` +
                    `📍 *DIRECCIÓN:* ${dir}`;

        window.open(`https://wa.me/${MI_WHATSAPP}?text=${encodeURIComponent(msj)}`, '_blank');
    }

    function mostrarAdmin() {
        if (prompt("Clave:") === "1027") {
            document.getElementById('admin-panel').style.display = 'block';
            renderizarTabla();
        }
    }

    function cerrarAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function renderizarTabla() {
        const tbody = document.getElementById('cuerpo-tabla');
        tbody.innerHTML = "";
        let total = 0;
        registros.forEach((r, index) => {
            total += r.monto;
            // Botón de cobro dinámico: Si debe, genera link al WhatsApp del cliente
            let accion = "";
            if (r.tipo === 'DEBE') {
                const msjCobro = `Hola ${r.nom}, te saludamos de *VIBRAS POSITIVAS HM*. Te escribimos para coordinar el pago de tu Arroz con Leche ($${r.monto.toLocaleString()}). ¡Gracias!`;
                accion = `<a class="btn-cobrar" href="https://wa.me/57${r.cel}?text=${encodeURIComponent(msjCobro)}" target="_blank">COBRAR</a>`;
            } else {
                accion = "✅ Pagado";
            }

            tbody.innerHTML += `<tr>
                <td>${r.nom}</td>
                <td>${r.tipo}</td>
                <td>${accion}</td>
            </tr>`;
        });
        document.getElementById('resumen-ventas').innerText = `$${total.toLocaleString()}`;
    }

    function descargarBackup() {
        const blob = new Blob([JSON.stringify(registros)], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "backup_ventas.txt";
        a.click();
    }

    function restaurarBackup(e) {
        const lector = new FileReader();
        lector.onload = (evt) => {
            registros = JSON.parse(evt.target.result);
            localStorage.setItem('db_vibras_hm', JSON.stringify(registros));
            renderizarTabla();
        };
        lector.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
